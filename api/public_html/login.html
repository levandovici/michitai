<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer API - Game Server Constructor</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .animated-bg {
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes pulseGlow {
            from { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
            to { box-shadow: 0 0 30px rgba(102, 126, 234, 0.8); }
        }
    </style>
</head>

<body class="min-h-screen animated-bg flex items-center justify-center">
    <!-- Header -->
    <header class="glass-effect border-b border-white/20 fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <img src="logo.png" alt="Multiplayer API Logo" class="w-10 h-10 rounded-xl object-contain">
                    <div>
                        <h1 class="text-lg font-bold text-white">Multiplayer API</h1>
                        <p class="text-xs text-white/70">Game Server Constructor</p>
                    </div>
                </a>
                
                <nav class="flex items-center space-x-6">
                    <a href="index.html" class="text-white/70 hover:text-white transition-colors">Home</a>
                    <a href="register.html" class="text-white/70 hover:text-white transition-colors">Register</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Login Form -->
    <div class="w-full max-w-md mx-auto px-6">
        <div class="glass-effect rounded-3xl p-8 shadow-2xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-white/10 flex items-center justify-center mx-auto mb-4">
                    <img src="logo.png" alt="Multiplayer API Logo" class="w-12 h-12 object-contain">
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
                <p class="text-white/70">Sign in to your account</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-white mb-2">
                        <i class="fas fa-envelope mr-2"></i>Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="Enter your email"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-white mb-2">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12"
                            placeholder="Enter your password"
                        >
                        <button 
                            type="button" 
                            id="toggle-password"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-white/50 hover:text-white transition-colors"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" id="remember" class="rounded border-white/20 bg-white/10 text-blue-500 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-white/70">Remember me</span>
                    </label>
                    <a href="reset-password.html" class="text-sm text-blue-300 hover:text-blue-200 transition-colors">
                        Forgot password?
                    </a>
                </div>

                <button 
                    type="submit" 
                    class="w-full btn-primary text-white py-3 rounded-xl font-semibold text-lg border-0 disabled:opacity-50 disabled:cursor-not-allowed"
                    id="login-btn"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    <span id="login-text">Sign In</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="my-8 flex items-center">
                <div class="flex-1 border-t border-white/20"></div>
                <span class="px-4 text-white/50 text-sm">or</span>
                <div class="flex-1 border-t border-white/20"></div>
            </div>

            <!-- Register Link -->
            <div class="text-center">
                <p class="text-white/70">
                    Don't have an account? 
                    <a href="register.html" class="text-blue-300 hover:text-blue-200 font-medium transition-colors">
                        Create one now
                    </a>
                </p>
            </div>
        </div>

        <!-- Additional Links -->
        <div class="text-center mt-6 space-y-2">
            <p class="text-white/50 text-sm">
                <a href="index.html" class="hover:text-white transition-colors">← Back to Home</a>
            </p>
        </div>
    </div>

    <!-- Notifications -->
    <div id="notifications" class="fixed top-20 right-6 z-50 space-y-2"></div>

    <!-- Loading Modal -->
    <div id="loading-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="glass-effect rounded-2xl p-8 text-center">
            <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-white font-medium" id="loading-text">Signing in...</p>
        </div>
    </div>

    <script>
        class LoginPage {
            constructor() {
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.checkExistingSession();
            }

            setupEventListeners() {
                // Form submission
                $('#login-form').on('submit', (e) => this.handleLogin(e));
                
                // Password toggle
                $('#toggle-password').on('click', () => this.togglePassword());
                
                // Enter key support
                $(document).on('keypress', (e) => {
                    if (e.which === 13 && $('#login-form').is(':visible')) {
                        $('#login-form').submit();
                    }
                });
            }

            togglePassword() {
                const passwordInput = $('#password');
                const toggleIcon = $('#toggle-password i');
                
                if (passwordInput.attr('type') === 'password') {
                    passwordInput.attr('type', 'text');
                    toggleIcon.removeClass('fa-eye').addClass('fa-eye-slash');
                } else {
                    passwordInput.attr('type', 'password');
                    toggleIcon.removeClass('fa-eye-slash').addClass('fa-eye');
                }
            }

            async handleLogin(e) {
                e.preventDefault();
                
                const email = $('#email').val().trim();
                const password = $('#password').val();
                const remember = $('#remember').is(':checked');

                if (!email || !password) {
                    this.showNotification('Please fill in all fields', 'error');
                    return;
                }

                if (!this.isValidEmail(email)) {
                    this.showNotification('Please enter a valid email address', 'error');
                    return;
                }

                try {
                    this.showLoading('Signing in...');
                    this.setButtonLoading(true);

                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            remember: remember
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.api_token) {
                        // Store authentication data
                        localStorage.setItem('api_token', result.api_token);
                        localStorage.setItem('user_email', result.email);
                        localStorage.setItem('user_plan', result.plan_type || 'Free');
                        
                        if (remember) {
                            localStorage.setItem('remember_login', 'true');
                        }

                        this.showNotification('Login successful! Redirecting...', 'success');
                        
                        // Redirect to profile page
                        setTimeout(() => {
                            window.location.href = 'profile.html';
                        }, 1500);

                    } else {
                        throw new Error(result.error || 'Login failed');
                    }

                } catch (error) {
                    this.showNotification(error.message, 'error');
                } finally {
                    this.hideLoading();
                    this.setButtonLoading(false);
                }
            }

            checkExistingSession() {
                const token = localStorage.getItem('api_token');
                if (token) {
                    // User is already logged in, redirect to profile
                    window.location.href = 'profile.html';
                }
            }

            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            setButtonLoading(loading) {
                const btn = $('#login-btn');
                const text = $('#login-text');
                
                if (loading) {
                    btn.prop('disabled', true);
                    text.html('<i class="fas fa-spinner fa-spin mr-2"></i>Signing in...');
                } else {
                    btn.prop('disabled', false);
                    text.html('<i class="fas fa-sign-in-alt mr-2"></i>Sign In');
                }
            }

            showLoading(message = 'Loading...') {
                $('#loading-text').text(message);
                $('#loading-modal').removeClass('hidden').addClass('flex');
            }

            hideLoading() {
                $('#loading-modal').addClass('hidden').removeClass('flex');
            }

            showNotification(message, type = 'info') {
                const colors = {
                    success: 'bg-green-500',
                    error: 'bg-red-500',
                    warning: 'bg-yellow-500',
                    info: 'bg-blue-500'
                };

                const notification = $(`
                    <div class="notification ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg max-w-sm">
                        <div class="flex items-center">
                            <i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation-triangle' : 'info'} mr-2"></i>
                            ${message}
                        </div>
                    </div>
                `);

                $('#notifications').append(notification);

                setTimeout(() => {
                    notification.fadeOut(() => notification.remove());
                }, 5000);
            }
        }

        // Initialize login page
        $(document).ready(() => {
            new LoginPage();
        });
    </script>
</body>
</html>
