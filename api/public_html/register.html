<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer API - Game Server Constructor</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .animated-bg {
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes pulseGlow {
            from { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
            to { box-shadow: 0 0 30px rgba(102, 126, 234, 0.8); }
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="min-h-screen animated-bg flex items-center justify-center py-12">
    <!-- Header -->
    <header class="glass-effect border-b border-white/20 fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center pulse-glow">
                        <i class="fas fa-cube text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">Multiplayer API</h1>
                        <p class="text-xs text-white/70">Game Server Constructor</p>
                    </div>
                </a>
                
                <nav class="flex items-center space-x-6">
                    <a href="index.html" class="text-white/70 hover:text-white transition-colors">Home</a>
                    <a href="login.html" class="text-white/70 hover:text-white transition-colors">Login</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Register Form -->
    <div class="w-full max-w-md mx-auto px-6 mt-20">
        <div class="glass-effect rounded-3xl p-8 shadow-2xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-green-500 to-blue-600 flex items-center justify-center mx-auto mb-4 pulse-glow">
                    <i class="fas fa-user-plus text-white text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
                <p class="text-white/70">Join developers building amazing games</p>
            </div>

            <!-- Register Form -->
            <form id="register-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-white mb-2">
                        <i class="fas fa-envelope mr-2"></i>Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="Enter your email"
                    >
                    <div id="email-feedback" class="mt-1 text-sm hidden"></div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-white mb-2">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12"
                            placeholder="Create a strong password"
                        >
                        <button 
                            type="button" 
                            id="toggle-password"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-white/50 hover:text-white transition-colors"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="mt-2">
                        <div class="password-strength bg-gray-600" id="password-strength"></div>
                        <div id="password-feedback" class="mt-1 text-xs text-white/70"></div>
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-white mb-2">
                        <i class="fas fa-lock mr-2"></i>Confirm Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="confirm-password" 
                            name="confirm-password" 
                            required
                            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12"
                            placeholder="Confirm your password"
                        >
                        <button 
                            type="button" 
                            id="toggle-confirm-password"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-white/50 hover:text-white transition-colors"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="confirm-password-feedback" class="mt-1 text-sm hidden"></div>
                </div>

                <div class="space-y-3">
                    <label class="flex items-start">
                        <input type="checkbox" id="terms" required class="mt-1 rounded border-white/20 bg-white/10 text-blue-500 focus:ring-blue-500">
                        <span class="ml-3 text-sm text-white/70">
                            I agree to the 
                            <a href="terms.html" class="text-blue-300 hover:text-blue-200 transition-colors">Terms of Service</a> 
                            and 
                            <a href="privacy.html" class="text-blue-300 hover:text-blue-200 transition-colors">Privacy Policy</a>
                        </span>
                    </label>
                    
                    <label class="flex items-start">
                        <input type="checkbox" id="newsletter" class="mt-1 rounded border-white/20 bg-white/10 text-blue-500 focus:ring-blue-500">
                        <span class="ml-3 text-sm text-white/70">
                            Send me updates about new features and developer resources
                        </span>
                    </label>
                </div>

                <button 
                    type="submit" 
                    class="w-full btn-primary text-white py-3 rounded-xl font-semibold text-lg border-0 disabled:opacity-50 disabled:cursor-not-allowed"
                    id="register-btn"
                    disabled
                >
                    <i class="fas fa-user-plus mr-2"></i>
                    <span id="register-text">Create Account</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="my-8 flex items-center">
                <div class="flex-1 border-t border-white/20"></div>
                <span class="px-4 text-white/50 text-sm">or</span>
                <div class="flex-1 border-t border-white/20"></div>
            </div>

            <!-- Login Link -->
            <div class="text-center">
                <p class="text-white/70">
                    Already have an account? 
                    <a href="login.html" class="text-blue-300 hover:text-blue-200 font-medium transition-colors">
                        Sign in here
                    </a>
                </p>
            </div>
        </div>

        <!-- Additional Links -->
        <div class="text-center mt-6 space-y-2">
            <p class="text-white/50 text-sm">
                <a href="index.html" class="hover:text-white transition-colors">← Back to Home</a>
            </p>
        </div>
    </div>

    <!-- Notifications -->
    <div id="notifications" class="fixed top-20 right-6 z-50 space-y-2"></div>

    <!-- Loading Modal -->
    <div id="loading-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="glass-effect rounded-2xl p-8 text-center">
            <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-white font-medium" id="loading-text">Creating account...</p>
        </div>
    </div>

    <script>
        class RegisterPage {
            constructor() {
                this.passwordStrength = 0;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.checkExistingSession();
            }

            setupEventListeners() {
                // Form submission
                $('#register-form').on('submit', (e) => this.handleRegister(e));
                
                // Password toggles
                $('#toggle-password').on('click', () => this.togglePassword('password'));
                $('#toggle-confirm-password').on('click', () => this.togglePassword('confirm-password'));
                
                // Real-time validation
                $('#email').on('input', () => this.validateEmail());
                $('#password').on('input', () => this.validatePassword());
                $('#confirm-password').on('input', () => this.validateConfirmPassword());
                $('#terms').on('change', () => this.validateForm());
                
                // Enter key support
                $(document).on('keypress', (e) => {
                    if (e.which === 13 && $('#register-form').is(':visible')) {
                        $('#register-form').submit();
                    }
                });
            }

            togglePassword(fieldId) {
                const passwordInput = $(`#${fieldId}`);
                const toggleIcon = $(`#toggle-${fieldId} i`);
                
                if (passwordInput.attr('type') === 'password') {
                    passwordInput.attr('type', 'text');
                    toggleIcon.removeClass('fa-eye').addClass('fa-eye-slash');
                } else {
                    passwordInput.attr('type', 'password');
                    toggleIcon.removeClass('fa-eye-slash').addClass('fa-eye');
                }
            }

            validateEmail() {
                const email = $('#email').val().trim();
                const feedback = $('#email-feedback');
                
                if (!email) {
                    feedback.addClass('hidden');
                    return false;
                }
                
                if (!this.isValidEmail(email)) {
                    feedback.removeClass('hidden').addClass('text-red-400').text('Please enter a valid email address');
                    return false;
                }
                
                feedback.removeClass('hidden text-red-400').addClass('text-green-400').text('✓ Valid email address');
                return true;
            }

            validatePassword() {
                const password = $('#password').val();
                const feedback = $('#password-feedback');
                const strengthBar = $('#password-strength');
                
                if (!password) {
                    feedback.text('');
                    strengthBar.removeClass().addClass('password-strength bg-gray-600');
                    this.passwordStrength = 0;
                    this.validateForm();
                    return false;
                }
                
                const strength = this.calculatePasswordStrength(password);
                this.passwordStrength = strength.score;
                
                // Update strength bar
                const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
                const widths = ['25%', '50%', '75%', '100%'];
                
                strengthBar.removeClass().addClass('password-strength').addClass(colors[strength.score - 1]);
                strengthBar.css('width', widths[strength.score - 1]);
                
                // Update feedback
                feedback.text(strength.feedback);
                
                this.validateConfirmPassword();
                this.validateForm();
                return strength.score >= 3;
            }

            validateConfirmPassword() {
                const password = $('#password').val();
                const confirmPassword = $('#confirm-password').val();
                const feedback = $('#confirm-password-feedback');
                
                if (!confirmPassword) {
                    feedback.addClass('hidden');
                    return false;
                }
                
                if (password !== confirmPassword) {
                    feedback.removeClass('hidden').addClass('text-red-400').text('Passwords do not match');
                    return false;
                }
                
                feedback.removeClass('hidden text-red-400').addClass('text-green-400').text('✓ Passwords match');
                return true;
            }

            validateForm() {
                const emailValid = this.validateEmail();
                const passwordValid = this.passwordStrength >= 3;
                const confirmPasswordValid = this.validateConfirmPassword();
                const termsAccepted = $('#terms').is(':checked');
                
                const isValid = emailValid && passwordValid && confirmPasswordValid && termsAccepted;
                $('#register-btn').prop('disabled', !isValid);
                
                return isValid;
            }

            calculatePasswordStrength(password) {
                let score = 0;
                let feedback = '';
                
                // Length check
                if (password.length >= 8) score++;
                if (password.length >= 12) score++;
                
                // Character variety
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
                if (/\d/.test(password)) score++;
                if (/[^A-Za-z0-9]/.test(password)) score++;
                
                // Feedback messages
                const feedbacks = [
                    'Very weak password',
                    'Weak password - add more characters',
                    'Fair password - add special characters',
                    'Good password',
                    'Strong password'
                ];
                
                return {
                    score: Math.min(score, 4),
                    feedback: feedbacks[Math.min(score, 4)]
                };
            }

            async handleRegister(e) {
                e.preventDefault();
                
                if (!this.validateForm()) {
                    this.showNotification('Please fix the errors above', 'error');
                    return;
                }

                const email = $('#email').val().trim();
                const password = $('#password').val();
                const newsletter = $('#newsletter').is(':checked');

                try {
                    this.showLoading('Creating your account...');
                    this.setButtonLoading(true);

                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            newsletter: newsletter
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.api_token) {
                        this.showNotification('Account created successfully! Please check your email to verify your account.', 'success');
                        
                        // Redirect to email confirmation page
                        setTimeout(() => {
                            window.location.href = `confirm-email.html?email=${encodeURIComponent(email)}`;
                        }, 2000);

                    } else {
                        throw new Error(result.error || 'Registration failed');
                    }

                } catch (error) {
                    this.showNotification(error.message, 'error');
                } finally {
                    this.hideLoading();
                    this.setButtonLoading(false);
                }
            }

            checkExistingSession() {
                const token = localStorage.getItem('api_token');
                if (token) {
                    // User is already logged in, redirect to profile
                    window.location.href = 'profile.html';
                }
            }

            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            setButtonLoading(loading) {
                const btn = $('#register-btn');
                const text = $('#register-text');
                
                if (loading) {
                    btn.prop('disabled', true);
                    text.html('<i class="fas fa-spinner fa-spin mr-2"></i>Creating Account...');
                } else {
                    text.html('<i class="fas fa-user-plus mr-2"></i>Create Account');
                    this.validateForm(); // Re-enable based on form validity
                }
            }

            showLoading(message = 'Loading...') {
                $('#loading-text').text(message);
                $('#loading-modal').removeClass('hidden').addClass('flex');
            }

            hideLoading() {
                $('#loading-modal').addClass('hidden').removeClass('flex');
            }

            showNotification(message, type = 'info') {
                const colors = {
                    success: 'bg-green-500',
                    error: 'bg-red-500',
                    warning: 'bg-yellow-500',
                    info: 'bg-blue-500'
                };

                const notification = $(`
                    <div class="notification ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg max-w-sm">
                        <div class="flex items-center">
                            <i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation-triangle' : 'info'} mr-2"></i>
                            ${message}
                        </div>
                    </div>
                `);

                $('#notifications').append(notification);

                setTimeout(() => {
                    notification.fadeOut(() => notification.remove());
                }, 7000);
            }
        }

        // Initialize register page
        $(document).ready(() => {
            new RegisterPage();
        });
    </script>
</body>
</html>
