<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michitai API Authentication Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .test-section {
            background: #f8fafc;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid #4f46e5;
        }

        .test-section h3 {
            color: #1e293b;
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .response-area {
            background: #1f2937;
            color: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
            white-space: pre-wrap;
        }

        .status-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
        }

        .status-error {
            background: #fef2f2;
            color: #dc2626;
        }

        .status-info {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .token-display {
            background: #f0f9ff;
            border: 2px solid #0ea5e9;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .api-endpoint {
            background: #1f2937;
            color: #10b981;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            display: inline-block;
            margin: 5px 0;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Michitai API Test</h1>
            <p>Authentication & Game Ownership Testing Interface</p>
        </div>

        <div class="content">
            <!-- Registration Section -->
            <div class="test-section">
                <h3>
                    <span class="icon">👤</span>
                    User Registration
                </h3>
                <div class="api-endpoint">POST /api/register</div>
                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" placeholder="test@example.com">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password:</label>
                    <input type="password" id="regPassword" placeholder="Your password">
                </div>
                <button class="btn" onclick="testRegister()">Register User</button>
                <div id="registerResponse" class="response-area" style="display: none;"></div>
            </div>

            <!-- Login Section -->
            <div class="test-section">
                <h3>
                    <span class="icon">🔐</span>
                    User Login
                </h3>
                <div class="api-endpoint">POST /api/login</div>
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" placeholder="test@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password:</label>
                    <input type="password" id="loginPassword" placeholder="Your password">
                </div>
                <button class="btn" onclick="testLogin()">Login</button>
                <div id="loginResponse" class="response-area" style="display: none;"></div>
                <div id="tokenDisplay" class="token-display" style="display: none;">
                    <strong>API Token:</strong> <span id="tokenValue"></span>
                </div>
            </div>

            <!-- Game Creation Section -->
            <div class="test-section">
                <h3>
                    <span class="icon">🎯</span>
                    Create Game (Authenticated)
                </h3>
                <div class="api-endpoint">POST /api/game/create</div>
                <div class="form-group">
                    <label for="gameName">Game Name:</label>
                    <input type="text" id="gameName" placeholder="My Awesome Game">
                </div>
                <div class="form-group">
                    <label for="gameDesc">Description:</label>
                    <input type="text" id="gameDesc" placeholder="Game description">
                </div>
                <button class="btn" onclick="testCreateGame()">Create Game</button>
                <div id="createGameResponse" class="response-area" style="display: none;"></div>
            </div>

            <!-- Game Listing Section -->
            <div class="test-section">
                <h3>
                    <span class="icon">📋</span>
                    List User's Games
                </h3>
                <div class="api-endpoint">GET /api/game/list</div>
                <button class="btn" onclick="testListGames()">List My Games</button>
                <div id="listGamesResponse" class="response-area" style="display: none;"></div>
            </div>

            <!-- Security Tests Section -->
            <div class="test-section">
                <h3>
                    <span class="icon">🔒</span>
                    Security Tests
                </h3>
                <button class="btn btn-secondary" onclick="testUnauthenticatedCreate()">Try Create Without Auth</button>
                <button class="btn btn-secondary" onclick="testUnauthenticatedList()">Try List Without Auth</button>
                <div id="securityTestResponse" class="response-area" style="display: none;"></div>
            </div>

            <!-- API Configuration -->
            <div class="test-section">
                <h3>
                    <span class="icon">⚙️</span>
                    API Configuration
                </h3>
                <div class="form-group">
                    <label for="apiBaseUrl">API Base URL:</label>
                    <input type="text" id="apiBaseUrl" value="/api" placeholder="/api">
                </div>
                <button class="btn btn-secondary" onclick="testApiConnection()">Test API Connection</button>
                <div id="connectionTestResponse" class="response-area" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentToken = null;

        function getApiBaseUrl() {
            return document.getElementById('apiBaseUrl').value || '/api';
        }

        async function makeApiRequest(endpoint, method = 'GET', data = null, useAuth = false) {
            const baseUrl = getApiBaseUrl();
            const url = `${baseUrl}${endpoint}`;
            
            const headers = {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            };

            if (useAuth && currentToken) {
                headers['X-API-Token'] = currentToken;
            }

            const config = {
                method: method,
                headers: headers
            };

            if (data) {
                config.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, config);
                const responseData = await response.text();
                
                let jsonData;
                try {
                    jsonData = JSON.parse(responseData);
                } catch (e) {
                    jsonData = { raw: responseData, error: 'Invalid JSON response' };
                }

                return {
                    status: response.status,
                    statusText: response.statusText,
                    data: jsonData,
                    url: url
                };
            } catch (error) {
                return {
                    status: 0,
                    statusText: 'Network Error',
                    data: { error: error.message },
                    url: url
                };
            }
        }

        function displayResponse(elementId, response) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            
            const statusClass = response.status >= 200 && response.status < 300 ? 'status-success' : 'status-error';
            
            element.innerHTML = `
<span class="${statusClass}">Status: ${response.status} ${response.statusText}</span>
URL: ${response.url}

Response:
${JSON.stringify(response.data, null, 2)}`;
        }

        async function testRegister() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            const response = await makeApiRequest('/register', 'POST', {
                email: email,
                password: password,
                newsletter: false
            });

            displayResponse('registerResponse', response);
        }

        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            const response = await makeApiRequest('/login', 'POST', {
                email: email,
                password: password
            });

            displayResponse('loginResponse', response);

            // Store token if login successful
            if (response.status === 200 && response.data.token) {
                currentToken = response.data.token;
                document.getElementById('tokenValue').textContent = currentToken;
                document.getElementById('tokenDisplay').style.display = 'block';
            }
        }

        async function testCreateGame() {
            if (!currentToken) {
                alert('Please login first to get an API token');
                return;
            }

            const name = document.getElementById('gameName').value || 'Test Game';
            const description = document.getElementById('gameDesc').value || 'Test game description';

            const response = await makeApiRequest('/game/create', 'POST', {
                name: name,
                description: description,
                max_players: 4
            }, true);

            displayResponse('createGameResponse', response);
        }

        async function testListGames() {
            if (!currentToken) {
                alert('Please login first to get an API token');
                return;
            }

            const response = await makeApiRequest('/game/list', 'GET', null, true);
            displayResponse('listGamesResponse', response);
        }

        async function testUnauthenticatedCreate() {
            const response = await makeApiRequest('/game/create', 'POST', {
                name: 'Unauthorized Game',
                description: 'This should fail'
            }, false);

            displayResponse('securityTestResponse', response);
        }

        async function testUnauthenticatedList() {
            const response = await makeApiRequest('/game/list', 'GET', null, false);
            displayResponse('securityTestResponse', response);
        }

        async function testApiConnection() {
            const response = await makeApiRequest('/login', 'GET');
            displayResponse('connectionTestResponse', response);
        }

        // Auto-fill test data
        document.getElementById('regEmail').value = 'test@example.com';
        document.getElementById('regPassword').value = 'Test@1234';
        document.getElementById('loginEmail').value = 'test@example.com';
        document.getElementById('loginPassword').value = 'Test@1234';
        document.getElementById('gameName').value = 'My Test Game';
        document.getElementById('gameDesc').value = 'A test game for authentication testing';
    </script>
</body>
</html>
